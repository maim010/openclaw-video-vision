name: Windows RDP 远程桌面 (zrok)

on:
  workflow_dispatch:   # 手动触发

jobs:
  rdp:
    runs-on: windows-11-arm
    steps:
      - name: 启用远程桌面
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          $password = ConvertTo-SecureString "YourRDPassword123!" -AsPlainText -Force
          Set-LocalUser -Name $env:USERNAME -Password $password
          Write-Host "远程桌面已启用，用户名: $env:USERNAME，密码: YourRDPassword123!"

      - name: 下载 zrok
        run: |
          Invoke-WebRequest -Uri "https://github.com/openziti/zrok/releases/latest/download/zrok_windows_arm64.zip" -OutFile "zrok.zip"
          Expand-Archive -Path zrok.zip -DestinationPath .
          Remove-Item zrok.zip

      - name: 配置 zrok
        env:
          ZROK_TOKEN: ${{ secrets.ZROK_TOKEN }}
        run: |
          if ($env:ZROK_TOKEN) {
            .\zrok.exe enable $env:ZROK_TOKEN --headless
            Write-Host "zrok 已启用"
          } else {
            Write-Host "未设置 ZROK_TOKEN，请先注册 zrok 并添加 secret" -ForegroundColor Red
            exit 1
          }

      - name: 启动 zrok 隧道
        run: |
          # 启动 TCP 隧道，将本地 3389 端口映射到公网
          $process = Start-Process -NoNewWindow -PassThru .\zrok.exe -ArgumentList "share public tcp:3389 --headless" -RedirectStandardOutput "zrok_output.txt"
          Start-Sleep -Seconds 10
          # 从输出中提取地址
          $output = Get-Content "zrok_output.txt"
          Write-Host "zrok 输出："
          $output
          # 尝试提取 TCP 地址
          $tcpAddr = ($output | Select-String -Pattern 'tcp://[^ ]+').Matches.Value
          if ($tcpAddr) {
            $cleanAddr = $tcpAddr -replace 'tcp://', ''
            Write-Host "===================================================="
            Write-Host "远程桌面连接信息："
            Write-Host "  地址：$cleanAddr"
            Write-Host "  用户名：$env:USERNAME"
            Write-Host "  密码：YourRDPassword123!"
            Write-Host "===================================================="
            Write-Host "请使用 Windows 远程桌面连接 (mstsc) 输入上述地址和凭据。"
          } else {
            Write-Host "未获取到 TCP 地址，请检查 zrok 是否正常启动。" -ForegroundColor Red
          }

      - name: 保持运行
        run: |
          Write-Host "保持虚拟机运行，避免因无输出而超时。"
          while ($true) {
            Write-Host "[$(Get-Date -Format 'HH:mm:ss')] 远程桌面可用，请连接。"
            Start-Sleep -Seconds 300
          }
