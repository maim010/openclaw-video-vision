name: Windows RDP 远程桌面

on:
  workflow_dispatch:   # 手动触发

jobs:
  rdp:
    runs-on: windows-11-arm
    steps:
      - name: 启用远程桌面
        run: |
          # 开启远程桌面服务
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
          # 允许防火墙通过
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          # 设置当前用户密码（用于登录）
          $password = ConvertTo-SecureString "YourRDPassword123!" -AsPlainText -Force
          Set-LocalUser -Name $env:USERNAME -Password $password
          Write-Host "远程桌面已启用，用户名: $env:USERNAME，密码: YourRDPassword123!"

      - name: 下载 ngrok
        run: |
          Invoke-WebRequest -Uri "https://bin.equinox.io/c/bNyj1mQVY4c/ngrok-v3-stable-windows-arm64.zip" -OutFile "ngrok.zip"
          Expand-Archive -Path ngrok.zip -DestinationPath .
          Remove-Item ngrok.zip

      - name: 启动 ngrok 隧道
        env:
          NGROK_AUTH_TOKEN: ${{ secrets.NGROK_AUTH_TOKEN }}
        run: |
          # 配置 ngrok 认证（如有 token）
          if ($env:NGROK_AUTH_TOKEN) {
            .\ngrok config add-authtoken $env:NGROK_AUTH_TOKEN
          }
          # 映射 RDP 端口 3389
          Start-Process -NoNewWindow .\ngrok -ArgumentList "tcp 3389"
          Start-Sleep -Seconds 10

      - name: 显示连接信息
        run: |
          Write-Host "等待 ngrok 获取地址..."
          Start-Sleep -Seconds 5
          $ngrokApi = "http://127.0.0.1:4040/api/tunnels"
          try {
            $tunnels = Invoke-RestMethod -Uri $ngrokApi
            $tcp = $tunnels.tunnels | Where-Object { $_.proto -eq "tcp" }
            if ($tcp) {
              $addr = $tcp.public_url -replace "tcp://", ""
              Write-Host "===================================================="
              Write-Host "远程桌面连接信息："
              Write-Host "  地址：$addr"
              Write-Host "  用户名：$env:USERNAME"
              Write-Host "  密码：YourRDPassword123!"
              Write-Host "===================================================="
              Write-Host "请使用 Windows 远程桌面连接 (mstsc) 输入上述地址和凭据。"
              Write-Host "此虚拟机将在 6 小时后自动关闭。"
            } else {
              Write-Host "未获取到隧道，请检查 ngrok 是否正常运行。" -ForegroundColor Red
            }
          } catch {
            Write-Host "无法连接 ngrok API，请稍后在日志中手动查看。" -ForegroundColor Yellow
          }

      - name: 保持运行（防止退出）
        run: |
          Write-Host "保持虚拟机运行，避免因无输出而超时。"
          while ($true) {
            Write-Host "[$(Get-Date -Format 'HH:mm:ss')] 远程桌面可用，请连接。"
            Start-Sleep -Seconds 300
          }
