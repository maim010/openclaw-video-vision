name: Windows RDP 远程桌面 (x64 + bore)

on:
  workflow_dispatch:

jobs:
  rdp:
    runs-on: windows-2022
    steps:
      - name: 启用远程桌面
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          $password = ConvertTo-SecureString "YourRDPassword123!" -AsPlainText -Force
          Set-LocalUser -Name $env:USERNAME -Password $password
          Write-Host "远程桌面已启用，用户名: $env:USERNAME，密码: YourRDPassword123!"

      - name: 下载 bore
        run: |
          Invoke-WebRequest -Uri "https://github.com/ekzhang/bore/releases/download/v0.5.0/bore-v0.5.0-x86_64-pc-windows-msvc.zip" -OutFile "bore.zip"
          Expand-Archive -Path bore.zip -DestinationPath .
          Remove-Item bore.zip

      - name: 启动 bore 并保持运行
        run: |
          # 启动 bore 并将输出重定向到文件
          Start-Process -NoNewWindow .\bore.exe -ArgumentList "local 3389 --to bore.pub" -RedirectStandardOutput "bore_out.txt" -RedirectStandardError "bore_err.txt"
          Start-Sleep -Seconds 10
          # 读取输出文件
          $output = Get-Content "bore_out.txt", "bore_err.txt" -ErrorAction SilentlyContinue
          Write-Host "bore 输出："
          $output
          # 提取地址
          $match = $output | Select-String -Pattern 'bore\.pub:(\d+)'
          if ($match) {
            $port = $match.Matches.Groups[1].Value
            $addr = "bore.pub:$port"
            Write-Host "===================================================="
            Write-Host "远程桌面连接信息："
            Write-Host "  地址：$addr"
            Write-Host "  用户名：$env:USERNAME"
            Write-Host "  密码：YourRDPassword123!"
            Write-Host "===================================================="
          } else {
            Write-Host "未能获取 bore 地址，请检查上方输出" -ForegroundColor Yellow
          }
          # 保持运行（防止作业退出）
          while ($true) {
            Write-Host "[$(Get-Date -Format 'HH:mm:ss')] 远程桌面可用，请连接。"
            Start-Sleep -Seconds 300
          }
