name: Windows RDP 远程桌面 (x64 + bore)

on:
  workflow_dispatch:

jobs:
  rdp:
    runs-on: windows-2022
    steps:
      - name: 创建管理员 RDP 用户
        run: |
          $rdpUser = "rdpuser"
          $rdpPass = "RdpPass123!"
          net user $rdpUser $rdpPass /add
          net localgroup "Administrators" $rdpUser /add        # 加入管理员组
          net localgroup "Remote Desktop Users" $rdpUser /add
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          Write-Host "管理员用户 $rdpUser 已创建，密码 $rdpPass"

      - name: 下载 bore
        run: |
          Invoke-WebRequest -Uri "https://github.com/ekzhang/bore/releases/download/v0.5.0/bore-v0.5.0-x86_64-pc-windows-msvc.zip" -OutFile "bore.zip"
          Expand-Archive -Path bore.zip -DestinationPath .
          Remove-Item bore.zip

      - name: 启动 bore 并保持运行
        run: |
          Start-Process -NoNewWindow .\bore.exe -ArgumentList "local 3389 --to bore.pub" -RedirectStandardOutput "bore_out.txt"
          Start-Sleep -Seconds 10
          $output = Get-Content "bore_out.txt" -ErrorAction SilentlyContinue
          Write-Host "bore 输出："
          $output
          $match = $output | Select-String -Pattern 'bore\.pub:(\d+)'
          if ($match) {
            $port = $match.Matches.Groups[1].Value
            $addr = "bore.pub:$port"
            Write-Host "===================================================="
            Write-Host "连接信息："
            Write-Host "  地址：$addr"
            Write-Host "  用户名：rdpuser"
            Write-Host "  密码：RdpPass123!"
            Write-Host "===================================================="
          } else {
            Write-Host "未能获取 bore 地址，请检查上方输出" -ForegroundColor Yellow
          }
          while ($true) {
            Write-Host "[$(Get-Date -Format 'HH:mm:ss')] 远程桌面可用，请连接。"
            Start-Sleep -Seconds 300
          }
