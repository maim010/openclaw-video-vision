name: Windows 游戏环境 + Sunshine 串流

on:
  workflow_dispatch:

jobs:
  gaming-windows:
    runs-on: windows-11-arm
    steps:
      - name: 显示系统信息
        run: systeminfo

      # ---------- 启用 RDP（备用）----------
      - name: 启用 RDP
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          $password = ConvertTo-SecureString "YourGamePass123!" -AsPlainText -Force
          Set-LocalUser -Name $env:USERNAME -Password $password

      # ---------- 下载 Sunshine ----------
      - name: 安装 Sunshine
        run: |
          # 下载 Sunshine 安装包（ARM64 版本）
          Invoke-WebRequest -Uri "https://github.com/LizardByte/Sunshine/releases/latest/download/sunshine-windows-arm64.zip" -OutFile "sunshine.zip"
          Expand-Archive -Path sunshine.zip -DestinationPath "C:\Sunshine"
          Remove-Item sunshine.zip
          # 添加防火墙规则
          netsh advfirewall firewall add rule name="Sunshine" dir=in action=allow protocol=TCP localport=47984,47989,48010
          netsh advfirewall firewall add rule name="Sunshine UDP" dir=in action=allow protocol=UDP localport=47998,47999,48000,48002,48010

      # ---------- 下载 ngrok ----------
      - name: 下载 ngrok
        run: |
          Invoke-WebRequest -Uri "https://bin.equinox.io/c/bNyj1mQVY4c/ngrok-v3-stable-windows-arm64.zip" -OutFile "ngrok.zip"
          Expand-Archive -Path ngrok.zip -DestinationPath .
          Remove-Item ngrok.zip

      # ---------- 启动 Sunshine ----------
      - name: 启动 Sunshine
        run: |
          Start-Process -FilePath "C:\Sunshine\sunshine.exe" -WindowStyle Hidden
          Start-Sleep -Seconds 5

      # ---------- 启动 ngrok（映射 Sunshine 的 Web 控制台 + 串流端口）----------
      - name: 启动 ngrok
        env:
          NGROK_AUTH_TOKEN: ${{ secrets.NGROK_AUTH_TOKEN }}
        run: |
          if ($env:NGROK_AUTH_TOKEN) {
            .\ngrok config add-authtoken $env:NGROK_AUTH_TOKEN
          }
          # 映射 Sunshine Web 控制台端口 47990
          Start-Process -NoNewWindow .\ngrok -ArgumentList "http 47990"
          # 映射串流端口 47989（Moonlight 需要）
          Start-Process -NoNewWindow .\ngrok -ArgumentList "tcp 47989"
          Start-Sleep -Seconds 5

      # ---------- 显示连接信息 ----------
      - name: 显示连接信息
        run: |
          Write-Host "===================================================="
          Write-Host "RDP 连接信息（备用）："
          Write-Host "  用户名：$env:USERNAME"
          Write-Host "  密码：YourGamePass123!"
          
          $ngrokApi = "http://127.0.0.1:4040/api/tunnels"
          try {
            $tunnels = Invoke-RestMethod -Uri $ngrokApi
            $web = $tunnels.tunnels | Where-Object { $_.proto -eq "https" -and $_.config.addr -like "*47990*" }
            if ($web) {
              Write-Host "`nSunshine Web 控制台：" $web.public_url -ForegroundColor Green
            }
          } catch {
            Write-Host "无法获取 ngrok 地址" -ForegroundColor Yellow
          }
          
          Write-Host "`n===================================================="
          Write-Host "Moonlight 连接步骤："
          Write-Host "  1. 先通过 RDP 连接到这台机器"
          Write-Host "  2. 在桌面上打开 Sunshine 控制台（http://127.0.0.1:47990）"
          Write-Host "  3. 设置用户名和密码（首次访问需要）"
          Write-Host "  4. 在 Moonlight 客户端添加此机器的 IP（通过 ngrok 获取）"
          Write-Host "  5. 配对成功后即可串流游戏"
          Write-Host "===================================================="

      - name: 保持活跃
        run: |
          while ($true) {
            Write-Host "[$(Get-Date -Format 'HH:mm:ss')] 虚拟机运行中，可通过 RDP 连接配置 Sunshine"
            Start-Sleep -Seconds 300
          }
